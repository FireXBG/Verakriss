      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/contacts.css" />
    <title>Контакти</title>
  </head>
  <body>
    <nav class="nav">
      <div class="nav-heading">
        <h1>Verakriss</h1>
      </div>
      <button onclick="changeClass()" class="burger"></button>
      <button onclick="returnClass()" class="inactive"></button>
      <ul class="navMenu">
        <li><a href="/index.html">Начало</a></li>
        <li><a href="/aboutus.html">За нас</a></li>

      </ul>
    </nav>

    <h1 class="contact-us-h1">Свържете се с нас</h1>
    <div class="form-container">
      <div class="form-left">
        <form>
          <input type="text" id="name" placeholder=" Вашето име" required />
          <input type="email" id="email" placeholder=" E-mail адрес" />
          <input
            type="text"
            id="phone"
            placeholder=" Тел. за контакт"
            required
          />
          <textarea
            id="message"
            rows="4"
            placeholder=" Как можем да ви помогнем?"
          ></textarea>
          <button type="submit">Изпрати</button>
        </form>
      </div>
      <div class="form-right">
        <h2>Телефон</h2>
        <p>+395 878572704</p>
        <h2>e-mail</h2>
        <p>office@verakriss.eu</p>
      </div>
    </div>
    <script src="https://smtpjs.com/v3/smtp.js"></script>
    <script src="/menu.js"></script>
    <script src="/contatcs.js"></script>
  </body>
